# =============================================================================
# Prometheus
# =============================================================================
prometheus:
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    # Scrape our app's /metrics endpoint
    additionalScrapeConfigs:
      - job_name: "gitops-api"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - three-tier
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: gitops-api
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: "$1:3000"
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

# =============================================================================
# Grafana
# =============================================================================
grafana:
  adminPassword: "grafana-admin-2026"

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 512Mi

  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
      service.beta.kubernetes.io/aws-load-balancer-type: nlb

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: "custom"
          orgId: 1
          folder: "Custom"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/custom

  dashboardsConfigMaps:
    custom: grafana-custom-dashboards

  # Default datasource already configured by kube-prometheus-stack

# =============================================================================
# Alertmanager
# =============================================================================
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: "email"
      routes:
        - match:
            severity: critical
          receiver: "email"
          repeat_interval: 1h
        - match:
            severity: warning
          receiver: "email"
          repeat_interval: 4h
    receivers:
      - name: "email"
        email_configs:
          - to: "myaugusthottie@gmail.com"
            from: "alertmanager@gitops-eks.com"
            smarthost: "email-smtp.us-east-1.amazonaws.com:587"
            auth_username: ""     # Set to SES SMTP username
            auth_password: ""     # Set to SES SMTP password
            require_tls: true
            send_resolved: true

# =============================================================================
# Node Exporter
# =============================================================================
nodeExporter:
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# =============================================================================
# kube-state-metrics
# =============================================================================
kubeStateMetrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# =============================================================================
# Default Alerting Rules (built-in) + keep them enabled
# =============================================================================
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false  # EKS manages etcd
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeSchedulerAlerting: false  # EKS manages scheduler
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    node: true
    nodeExporterAlerting: true
    prometheus: true
