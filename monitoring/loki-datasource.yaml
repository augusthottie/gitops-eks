apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-loki-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki-stack:3100
        isDefault: false
        jsonData:
          derivedFields:
            - name: TraceID
              matcherRegex: "traceId=(\\w+)"
              url: ""
              datasourceUid: ""
          maxLines: 1000
